<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Mexicanos Dijeron</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
</head>

<body>
    <div class="container">
        <div class="logo-container">
            <img src="images/logo.png" alt="100 Mexicanos Dijeron" class="logo">
        </div>

        <div class="menu-options">
            <button id="play-game" class="menu-btn main-btn">Jugar partida</button>
            <button id="quick-round" class="menu-btn">Ronda rápida</button>
            <button id="create-questions" class="menu-btn">Crear preguntas</button>
            <button id="instructions" class="menu-btn">Instrucciones</button>
        </div>

        <div class="lights"></div>
    </div>

    <audio id="start-sound" src="sounds/start.mp3" type="audio/mpeg" preload="auto"></audio>
    <script src="js/menu.js"></script>
</body>

</html>
